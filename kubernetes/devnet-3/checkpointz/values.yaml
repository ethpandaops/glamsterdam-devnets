        sub_filter_once off;
    hosts:
      - host: checkpoint-sync.glamsterdam-devnet-3.ethpandaops.io
        paths:
          - path: /
            pathType: Prefix

    tls:
    - hosts:
      - checkpoint-sync.glamsterdam-devnet-3.ethpandaops.io
      secretName: glamsterdam-devnet-3-checkpoint-sync-tls

  config:
    global:
      listenAddr: ":5555"
      logging: "info" # panic,fatal,warm,info,debug,trace
      metricsAddr: ":9090"

    checkpointz:
      mode: full
      caches:
        blocks:
          max_items: 100
        states:
          max_items: 5
      historical_epoch_count: 20

